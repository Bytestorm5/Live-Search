<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!--
      Privacy egress lock (architecture spec §7.1).

      The `connect-src` is restricted so the page cannot POST audio or transcript
      text to arbitrary endpoints — the browser refuses the request before it
      leaves the tab, and any skeptical user can verify this in DevTools. By
      default it allows ONLY the Hugging Face model origin (for first-load weight
      downloads, spec §7.1 "'self' or only the model origin"); audio/transcripts
      are still never sent because no code path POSTs them and only GETs reach HF.

      STRICT / air-gapped mode (spec §7.2): self-host the weights under /models/
      (set VITE_ALLOW_REMOTE_MODELS=false) and reduce `connect-src` to just
      'self'. `'wasm-unsafe-eval'` is required to compile the ONNX Runtime
      WebAssembly; `worker-src blob:` because ORT spawns wasm threads from blobs.

      NOTE: A CSP delivered as an HTTP *header* is stronger than this meta tag
      (a header cannot be stripped by an injected <meta>). Production hosts
      should send the equivalent header — see public/_headers.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="
        default-src 'self';
        script-src 'self' 'wasm-unsafe-eval';
        worker-src 'self' blob:;
        style-src 'self' 'unsafe-inline';
        img-src 'self' data:;
        font-src 'self';
        connect-src 'self' https://huggingface.co https://*.huggingface.co https://*.hf.co;
        object-src 'none';
        base-uri 'self';
        form-action 'none';
        frame-ancestors 'none';
      "
    />

    <title>Live Search — Private Live Transcription &amp; Docs Lookup</title>
  </head>
  <body>
    <div id="app" aria-live="polite"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
