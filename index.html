<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!--
      Content-Security-Policy.

      `connect-src` is restricted to this origin plus the OpenAI API (the only
      external service): audio is streamed to wss://api.openai.com for
      transcription, and nothing can be POSTed elsewhere. `https://*.hf.co` /
      `huggingface.co` are only needed if you enable the OPTIONAL local semantic
      search (MiniLM); remove them otherwise. `'wasm-unsafe-eval'` + `worker-src
      blob:` are only required by that optional ONNX Runtime path.

      A CSP delivered as an HTTP header is stronger than this meta tag; production
      hosts should send the equivalent header — see public/_headers.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="
        default-src 'self';
        script-src 'self' 'wasm-unsafe-eval';
        worker-src 'self' blob:;
        style-src 'self' 'unsafe-inline';
        img-src 'self' data:;
        font-src 'self';
        connect-src 'self' https://api.openai.com wss://api.openai.com https://huggingface.co https://*.huggingface.co https://*.hf.co;
        object-src 'none';
        base-uri 'self';
        form-action 'none';
        frame-ancestors 'none';
      "
    />

    <title>Live Search — Live Transcription &amp; Docs Lookup</title>
  </head>
  <body>
    <div id="app" aria-live="polite"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
